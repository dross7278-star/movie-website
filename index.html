<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Movies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <div class="hero-copy-block">
                <p class="eyebrow">Movie explorer</p>
                <h1>Action Movies</h1>
                <p class="hero-copy">Search by title, year, director, rating, and more to browse movies in a bold blue layout.</p>
            </div>
            <div class="hero-sort" aria-label="Sort movies">
                <span class="hero-sort-label">Sort by</span>
                <select id="sort-field" name="sort-field" aria-label="Sort movies by field">
                    <option value="title">Title</option>
                    <option value="year">Year</option>
                    <option value="rating">Rating</option>
                </select>
            </div>
        </header>

        <main class="content">
            <section class="search-panel" aria-label="Movie search form">
                <form id="search-form" class="search-form">
                    <label>
                        Title
                        <input id="title-input" name="title" type="text" placeholder="For example: Avengers" autocomplete="off">
                    </label>
                    <label>
                        Year
                        <input id="year-input" name="year" type="number" placeholder="2018" min="1888" max="2100">
                    </label>
                    <label>
                        Director
                        <input id="director-input" name="director" type="text" placeholder="Joss Whedon" autocomplete="off">
                    </label>
                    <label>
                        Minimum rating
                        <input id="rating-input" name="rating" type="number" placeholder="7" min="0" max="10" step="0.1">
                    </label>

                    <div class="search-actions">
                        <button type="submit">Search movies</button>
                        <button type="button" id="clear-button" class="secondary">Clear</button>
                    </div>
                </form>
            </section>

            <section class="results-panel" aria-live="polite">
                <div class="results-meta">
                    <div>
                        <p class="section-label">Body display</p>
                        <p id="results-summary">Featured movies and search results appear here.</p>
                    </div>
                    <p id="status-message" class="status-message"></p>
                </div>
                <div id="featured-strip" class="featured-strip"></div>
                <div id="results-grid" class="results-grid"></div>
            </section>
        </main>
    </div>

    <script src="javascript.js" defer></script>
</body>
</html>
